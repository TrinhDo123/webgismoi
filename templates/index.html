<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <title>BIẾN ĐỘNG ĐƯỜNG BỜ BIỂN</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
        }

        .sidebar-left {
            width: 340px;
            background: white;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-right {
            width: 460px;
            background: white;
            border-left: 1px solid #e2e8f0;
            overflow-y: auto;
            padding: 15px;
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            line-height: 1.35;
            color: #111827;
        }

        h3 {
            margin: 0 0 12px 0;
            font-size: 13px;
            text-transform: uppercase;
            border-left: 4px solid #4F46E5;
            padding-left: 10px;
            color: #1e293b;
        }

        select,
        button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            margin-top: 6px;
            font-size: 12px;
        }

        button {
            background: #4F46E5;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
            padding: 7px 0;
            font-size: 12px;
        }

        .chart-box {
            position: relative;
            height: 220px;
        }

        .info-box {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 13px;
        }

        .success {
            color: #22c55e;
            font-weight: bold;
        }

        .danger {
            color: #ef4444;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 110px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            resize: none;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="sidebar-left">

    <div class="card">
        <h2>BIẾN ĐỘNG ĐƯỜNG BỜ BIỂN</h2>

        <h3>📍 Cấu hình phân tích</h3>

        <select id="province"></select>

        <div style="display:flex; gap:5px;">
            <select id="y1"></select>
            <select id="y2"></select>
        </div>

        <button id="btnStart" onclick="startAnalysis()">
            🚀 CHẠY PHÂN TÍCH
        </button>
    </div>

    <div class="card">
        <h3>🛰️ Lớp dữ liệu</h3>
        <div id="layer-list"></div>
    </div>

    <div class="card">
        <h3>📊 Thông số</h3>
        <div id="stats-info">
            Chưa có dữ liệu
        </div>
    </div>

</div>

<div id="map"></div>

<div class="sidebar-right">

    <div class="card">
        <h3>📈 Biểu đồ chỉ số</h3>
        <div class="chart-box">
            <canvas id="chart1"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>🧠 Phân tích AI & Dự báo</h3>
        <div
            id="ai-report"
            style="
                font-size:13px;
                line-height:1.8;
                text-align:justify;
            "
        >
            Chưa có dữ liệu
        </div>
    </div>

    <div class="card">
        <h3>🤖 AI trả lời câu hỏi</h3>

        <textarea
            id="ai-question"
            placeholder="Ví dụ: Phân tích nguy cơ xói mòn tỉnh Khánh Hòa..."
        ></textarea>

        <button
            onclick="askAI()"
            style="margin-top:10px;"
        >
            🚀 Gửi câu hỏi AI
        </button>

        <div
            id="ai-answer"
            style="
                margin-top:15px;
                line-height:1.8;
                font-size:13px;
                background:#f8fafc;
                border:1px solid #e2e8f0;
                border-radius:10px;
                padding:12px;
                min-height:80px;
                white-space:pre-wrap;
            "
        >
            AI sẽ trả lời tại đây...
        </div>
    </div>

    <div class="card">
        <h3>🌊 Biến động diện tích</h3>
        <div class="chart-box">
            <canvas id="chart2"></canvas>
        </div>
    </div>

</div>

<script src="/appp.js?v=10"></script>

</body>
</html>
