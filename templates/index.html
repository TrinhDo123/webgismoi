<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <title>BIẾN ĐỘNG ĐƯỜNG BỜ BIỂN</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/static/style.css?v=35">
</head>
<body>

<div class="sidebar-left">
    <div class="card">
        <h2>BIẾN ĐỘNG ĐƯỜNG BỜ BIỂN</h2>
        <h3>📍 Cấu hình phân tích</h3>

        <select id="province"></select>

        <div style="display:flex; gap:5px;">
            <select id="y1"></select>
            <select id="y2"></select>
        </div>

        <button id="btnStart" onclick="startAnalysis()">🚀 CHẠY PHÂN TÍCH</button>
    </div>

    <div class="card">
        <h3>🛰️ Lớp dữ liệu</h3>
        <div id="layer-list"></div>
    </div>

    <div class="card">
        <h3>📊 Thông số</h3>
        <div id="stats-info">Chưa có dữ liệu</div>
    </div>
</div>

<div id="map"></div>

<div class="sidebar-right">
    <div class="card">
        <h3>📈 Biểu đồ chỉ số</h3>
        <div class="chart-box"><canvas id="chart1"></canvas></div>
    </div>

    <div class="card">
        <h3>🧠 Phân tích AI & Dự báo</h3>
        <div id="ai-report">Chưa có dữ liệu</div>
    </div>

    <div class="card">
        <h3>🤖 AI trả lời câu hỏi</h3>
        <textarea id="ai-question" placeholder="Ví dụ: Phân tích nguy cơ xói mòn tỉnh Khánh Hòa..."></textarea>
        <button onclick="askAI()" style="margin-top:10px;">🚀 Gửi câu hỏi AI</button>
        <div id="ai-answer">AI sẽ trả lời tại đây...</div>
    </div>

    <div class="card">
        <h3>🌊 Biến động diện tích</h3>
        <div class="chart-box"><canvas id="chart2"></canvas></div>
    </div>
</div>

<script src="/static/appp.js?v=35"></script>
</body>
</html>
